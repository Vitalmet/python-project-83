{% extends "layout.html" %}

{% block title %}Анализатор страниц{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center">
        <h1 class="display-4 mb-4">Анализатор страниц</h1>
        <p class="lead mb-4">Бесплатно проверяйте сайты на SEO-пригодность</p>

        <form action="{{ url_for('add_url') }}" method="post" class="mb-4">
            <div class="input-group mb-3">
                <input type="url"
                       name="url"
                       class="form-control form-control-lg"
                       placeholder="https://www.example.com"
                       value="{{ request.form.get('url', '') }}"
                       required>
                <button class="btn btn-primary btn-lg" type="submit">Проверить</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
