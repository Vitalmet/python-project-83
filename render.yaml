services:
  - type: web
    name: page-analyzer
    runtime: python
    plan: free
    region: oregon
    buildCommand: "./build.sh"
    startCommand: "gunicorn page_analyzer.app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: page-analyzer-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0

databases:
  - name: page-analyzer-db
    databaseName: page_analyzer
    user: page_analyzer_user
    plan: free